<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/assets/logo.webp" />
    <link rel="apple-touch-icon" href="/assets/logo.webp" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A1628" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Figgle Media" />
    <!-- Hero bg is opacity-30 decoration, not LCP. No preload — the H1 text is
         LCP and needs the font bandwidth. Image still eager-loads from Hero.tsx. -->
    <!-- Partytown config: tells the worker to forward dataLayer.push/gtag calls
         from main-thread code (anything that calls window.gtag()) into the
         worker where gtag.js actually runs. Without `forward`, main-thread
         gtag() calls would be no-ops. -->
    <script>
      partytown = {
        lib: '/~partytown/',
        forward: ['dataLayer.push', 'gtag'],
      };
    </script>
    <!-- Partytown bootstrap: loads the main-thread shim that relays script tags
         with type="text/partytown" into a worker. Runtime files are copied to
         public/~partytown/ by scripts/copy-partytown.mjs during build. -->
    <script src="/~partytown/partytown.js" async></script>
    <!-- Google tag (gtag.js) — runs inside the Partytown worker so it can't
         cause forced reflows or long main-thread tasks. -->
    <script type="text/partytown">
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WZKXG2GY6E');
    </script>
    <script
      type="text/partytown"
      src="https://www.googletagmanager.com/gtag/js?id=G-WZKXG2GY6E"
    ></script>
    <title>Figgle Media — Web Design & SEO for North Carolina Contractors</title>
    <meta
      name="description"
      content="Custom websites and local SEO that turn searches into booked jobs for contractors across North Carolina."
    />
    <!-- Default Open Graph tags (page-level Helmet tags override these) -->
    <meta property="og:site_name" content="Figgle Media" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Figgle Media — Web Design & SEO for North Carolina Contractors" />
    <meta property="og:description" content="Custom websites and local SEO that turn searches into booked jobs for contractors across North Carolina." />
    <meta property="og:url" content="https://figglemedia.com/" />
    <meta property="og:image" content="https://figglemedia.com/assets/logo.webp" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Figgle Media logo" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@figglemedia" />
    <meta name="twitter:title" content="Figgle Media — Web Design & SEO for North Carolina Contractors" />
    <meta name="twitter:description" content="Custom websites and local SEO that turn searches into booked jobs for contractors across North Carolina." />
    <meta name="twitter:image" content="https://figglemedia.com/assets/logo.webp" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
