  <circle cx="300" cy="380" r="6" fill="#0D5C3B"/>
  <path d="M 297 380 L 299 383 L 304 377" stroke="#fff" stroke-width="2" fill="none"/>
  <rect x="315" y="375" width="180" height="10" rx="2" fill="#666" opacity="0.4"/>

  <circle cx="300" cy="410" r="6" fill="#0D5C3B"/>
  <path d="M 297 410 L 299 413 L 304 407" stroke="#fff" stroke-width="2" fill="none"/>
  <rect x="315" y="405" width="200" height="10" rx="2" fill="#666" opacity="0.4"/>

  <circle cx="300" cy="440" r="6" fill="#0D5C3B"/>
