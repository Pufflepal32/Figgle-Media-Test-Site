      <stop offset="50%" style="stop-color:#0F3556;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0C2340;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid1" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0D5C3B" stroke-width="1" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad1)"/>
  <rect width="1200" height="630" fill="url(#grid1)"/>

  <!-- Laptop/Monitor Shape -->
  <rect x="250" y="150" width="700" height="400" rx="10" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
  <rect x="270" y="170" width="660" height="370" fill="#fff"/>

  <!-- Website Elements on Screen -->
  <!-- Header Bar -->
  <rect x="270" y="170" width="660" height="50" fill="#0C2340"/>
  <circle cx="300" cy="195" r="8" fill="#D2622A"/>
  <rect x="320" y="188" width="100" height="14" rx="3" fill="#F5E6D3" opacity="0.7"/>

  <!-- Hero Section -->
  <rect x="290" y="240" width="300" height="20" rx="3" fill="#0C2340" opacity="0.8"/>
  <rect x="290" y="270" width="250" height="12" rx="2" fill="#666" opacity="0.5"/>
  <rect x="290" y="290" width="280" height="12" rx="2" fill="#666" opacity="0.5"/>

