  <!-- Form Box -->
  <rect x="620" y="240" width="280" height="270" rx="8" fill="#F5E6D3" opacity="0.9"/>
  <rect x="640" y="260" width="240" height="30" rx="4" fill="#fff"/>
  <rect x="640" y="300" width="240" height="30" rx="4" fill="#fff"/>
  <rect x="640" y="340" width="240" height="30" rx="4" fill="#fff"/>
  <rect x="640" y="385" width="240" height="45" rx="6" fill="#D2622A"/>

