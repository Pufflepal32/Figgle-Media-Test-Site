<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1a2947"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="38" font-weight="bold">10 Signs You Need a New Website</text>
  <text x="600" y="115" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="20">Is your website holding you back?</text>

  <!-- Laptop body -->
  <rect x="350" y="160" width="500" height="320" rx="12" fill="#1e3a5f" stroke="#FF6B2C" stroke-width="2"/>
  <!-- Screen -->
  <rect x="370" y="180" width="460" height="260" rx="4" fill="#0d1f3c"/>
  <!-- Laptop base -->
  <rect x="300" y="480" width="600" height="20" rx="6" fill="#1e3a5f" stroke="#FF6B2C" stroke-width="1"/>

  <!-- Cracked screen lines -->
  <line x1="600" y1="250" x2="520" y2="350" stroke="#FF6B2C" stroke-width="2" opacity="0.7"/>
  <line x1="600" y1="250" x2="680" y2="370" stroke="#FF6B2C" stroke-width="2" opacity="0.7"/>
  <line x1="600" y1="250" x2="560" y2="400" stroke="#FF6B2C" stroke-width="2" opacity="0.7"/>
  <line x1="600" y1="250" x2="650" y2="300" stroke="#FF6B2C" stroke-width="2" opacity="0.7"/>

  <!-- Warning triangle on screen -->
  <polygon points="600,220 570,280 630,280" fill="none" stroke="#FF6B2C" stroke-width="3"/>
  <text x="600" y="272" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="28" font-weight="bold">!</text>

  <!-- Checklist on left -->
  <rect x="80" y="200" width="220" height="280" rx="8" fill="#1e3a5f" opacity="0.6"/>
  <text x="190" y="235" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Checklist</text>

  <line x1="105" y1="260" x2="120" y2="275" stroke="#FF6B2C" stroke-width="3"/>
  <line x1="120" y1="260" x2="105" y2="275" stroke="#FF6B2C" stroke-width="3"/>
  <text x="140" y="273" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="14" opacity="0.6">Slow loading</text>

  <line x1="105" y1="295" x2="120" y2="310" stroke="#FF6B2C" stroke-width="3"/>
  <line x1="120" y1="295" x2="105" y2="310" stroke="#FF6B2C" stroke-width="3"/>
  <text x="140" y="308" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="14" opacity="0.6">Not mobile</text>

  <line x1="105" y1="330" x2="120" y2="345" stroke="#FF6B2C" stroke-width="3"/>
  <line x1="120" y1="330" x2="105" y2="345" stroke="#FF6B2C" stroke-width="3"/>
  <text x="140" y="343" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="14" opacity="0.6">Outdated design</text>

  <line x1="105" y1="365" x2="120" y2="380" stroke="#FF6B2C" stroke-width="3"/>
  <line x1="120" y1="365" x2="105" y2="380" stroke="#FF6B2C" stroke-width="3"/>
  <text x="140" y="378" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="14" opacity="0.6">No leads</text>

  <line x1="105" y1="400" x2="120" y2="415" stroke="#FF6B2C" stroke-width="3"/>
  <line x1="120" y1="400" x2="105" y2="415" stroke="#FF6B2C" stroke-width="3"/>
  <text x="140" y="413" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="14" opacity="0.6">Bad SEO</text>

  <!-- Decorative dots -->
  <circle cx="920" cy="250" r="4" fill="#FF6B2C" opacity="0.3"/>
  <circle cx="960" cy="300" r="6" fill="#FF6B2C" opacity="0.2"/>
  <circle cx="940" cy="380" r="3" fill="#10B981" opacity="0.3"/>
  <circle cx="980" cy="350" r="5" fill="#F5EFE6" opacity="0.1"/>

  <text x="600" y="570" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.5">Figgle Media</text>
</svg>