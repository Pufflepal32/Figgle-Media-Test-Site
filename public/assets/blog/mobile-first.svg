<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1a2947"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="38" font-weight="bold">Mobile-First Design</text>
  <text x="600" y="115" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="20">Build for the device your customers use most</text>

  <!-- Phone outline -->
  <rect x="470" y="145" width="260" height="440" rx="28" fill="#1e3a5f" stroke="#F5EFE6" stroke-width="2.5"/>
  <rect x="485" y="180" width="230" height="370" rx="4" fill="#0d1f3c"/>
  <rect x="560" y="155" width="80" height="8" rx="4" fill="#0d1f3c"/>

  <!-- Website layout inside phone -->
  <rect x="495" y="190" width="210" height="35" rx="3" fill="#FF6B2C" opacity="0.3"/>
  <rect x="505" y="200" width="60" height="15" rx="2" fill="#FF6B2C" opacity="0.6"/>
  <rect x="495" y="235" width="210" height="80" rx="3" fill="#1e3a5f"/>
  <text x="600" y="282" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="14" opacity="0.4">Hero</text>
  <rect x="495" y="325" width="210" height="8" rx="2" fill="#F5EFE6" opacity="0.15"/>
  <rect x="495" y="342" width="180" height="8" rx="2" fill="#F5EFE6" opacity="0.1"/>
  <rect x="495" y="359" width="195" height="8" rx="2" fill="#F5EFE6" opacity="0.1"/>
  <rect x="510" y="385" width="180" height="36" rx="18" fill="#FF6B2C" opacity="0.7"/>
  <text x="600" y="408" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Get a Quote</text>
  <rect x="495" y="435" width="100" height="60" rx="4" fill="#1e3a5f"/>
  <rect x="605" y="435" width="100" height="60" rx="4" fill="#1e3a5f"/>
  <rect x="495" y="510" width="210" height="30" rx="3" fill="#1e3a5f"/>
  <circle cx="530" cy="525" r="6" fill="#F5EFE6" opacity="0.3"/>
  <circle cx="570" cy="525" r="6" fill="#F5EFE6" opacity="0.3"/>
  <circle cx="610" cy="525" r="6" fill="#FF6B2C" opacity="0.5"/>
  <circle cx="650" cy="525" r="6" fill="#F5EFE6" opacity="0.3"/>
  <circle cx="690" cy="525" r="6" fill="#F5EFE6" opacity="0.3"/>

  <!-- Speed indicator -->
  <circle cx="200" cy="350" r="70" fill="none" stroke="#1e3a5f" stroke-width="8"/>
  <circle cx="200" cy="350" r="70" fill="none" stroke="#10B981" stroke-width="8" stroke-dasharray="330 440" stroke-linecap="round" transform="rotate(-90,200,350)"/>
  <text x="200" y="345" text-anchor="middle" fill="#10B981" font-family="Arial, sans-serif" font-size="28" font-weight="bold">98</text>
  <text x="200" y="370" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="12" opacity="0.6">Speed Score</text>

  <!-- Responsive icon -->
  <rect x="870" y="280" width="180" height="120" rx="8" fill="none" stroke="#F5EFE6" stroke-width="1.5" opacity="0.3"/>
  <rect x="900" y="310" width="50" height="70" rx="6" fill="none" stroke="#FF6B2C" stroke-width="1.5"/>
  <rect x="970" y="300" width="60" height="40" rx="4" fill="none" stroke="#F5EFE6" stroke-width="1.5" opacity="0.3"/>
  <text x="960" y="430" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="13" opacity="0.5">Responsive</text>

  <text x="600" y="610" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.5">Figgle Media</text>
