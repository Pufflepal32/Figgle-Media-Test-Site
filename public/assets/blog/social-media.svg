<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1a2947"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="38" font-weight="bold">Social Media Marketing</text>
  <text x="600" y="115" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="20">Grow your audience and engage customers</text>

  <!-- Phone outline -->
  <rect x="470" y="145" width="260" height="430" rx="28" fill="#1e3a5f" stroke="#F5EFE6" stroke-width="2"/>
  <rect x="485" y="175" width="230" height="370" rx="4" fill="#0d1f3c"/>
  <rect x="560" y="153" width="80" height="8" rx="4" fill="#0d1f3c"/>

  <!-- Social feed inside phone -->
  <!-- Profile header -->
  <circle cx="515" cy="200" r="12" fill="#FF6B2C" opacity="0.5"/>
  <rect x="535" y="192" width="80" height="8" rx="2" fill="#F5EFE6" opacity="0.3"/>
  <rect x="535" y="205" width="50" height="6" rx="2" fill="#F5EFE6" opacity="0.15"/>
  <!-- Post image -->
  <rect x="495" y="225" width="210" height="120" rx="4" fill="#1e3a5f"/>
  <text x="600" y="292" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="12" opacity="0.3">Post Image</text>
  <!-- Like bar -->
  <rect x="495" y="355" width="210" height="30" fill="none"/>
  <text x="515" y="375" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="18">&#9829;</text>
  <text x="540" y="373" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="12" opacity="0.5">247</text>
  <!-- Comment lines -->
  <rect x="495" y="390" width="180" height="6" rx="2" fill="#F5EFE6" opacity="0.1"/>
  <rect x="495" y="405" width="140" height="6" rx="2" fill="#F5EFE6" opacity="0.08"/>
  <!-- Second post preview -->
  <circle cx="515" cy="435" r="12" fill="#10B981" opacity="0.5"/>
  <rect x="535" y="428" width="80" height="8" rx="2" fill="#F5EFE6" opacity="0.3"/>
  <rect x="535" y="441" width="50" height="6" rx="2" fill="#F5EFE6" opacity="0.15"/>
  <rect x="495" y="460" width="210" height="70" rx="4" fill="#1e3a5f"/>

  <!-- Floating heart icons -->
  <text x="380" y="250" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="28" opacity="0.6">&#9829;</text>
  <text x="350" y="320" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="20" opacity="0.4">&#9829;</text>
  <text x="400" y="190" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="16" opacity="0.3">&#9829;</text>

  <!-- Like/thumbs up icons floating right -->
  <circle cx="800" cy="240" r="18" fill="#10B981" opacity="0.3"/>
  <text x="800" y="246" text-anchor="middle" fill="#10B981" font-family="Arial, sans-serif" font-size="16">+1</text>
  <circle cx="830" cy="320" r="14" fill="#FF6B2C" opacity="0.3"/>
  <text x="830" y="326" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="12">&#9829;</text>
  <circle cx="790" cy="390" r="16" fill="#F5EFE6" opacity="0.1"/>

  <!-- Follower count -->
  <rect x="850" y="400" width="200" height="80" rx="10" fill="#1e3a5f" stroke="#FF6B2C" stroke-width="1"/>
  <text x="950" y="435" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="28" font-weight="bold">12.5K</text>
  <text x="950" y="460" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="14" opacity="0.5">followers</text>

  <!-- Engagement stats left -->
  <rect x="130" y="400" width="200" height="80" rx="10" fill="#1e3a5f" stroke="#10B981" stroke-width="1"/>
  <text x="230" y="435" text-anchor="middle" fill="#10B981" font-family="Arial, sans-serif" font-size="28" font-weight="bold">8.2%</text>
  <text x="230" y="460" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="14" opacity="0.5">engagement</text>

  <text x="600" y="600" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.5">Figgle Media</text>
</svg>