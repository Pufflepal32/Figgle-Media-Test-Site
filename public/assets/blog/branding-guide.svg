<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1a2947"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="38" font-weight="bold">Building a Strong Brand</text>
  <text x="600" y="115" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="20">Create a memorable identity for your business</text>

  <!-- Color palette swatches on left -->
  <rect x="140" y="200" width="250" height="280" rx="12" fill="#1e3a5f" opacity="0.4"/>
  <text x="265" y="235" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Color Palette</text>

  <rect x="170" y="255" width="60" height="60" rx="6" fill="#FF6B2C"/>
  <text x="200" y="335" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="10" opacity="0.5">#FF6B2C</text>

  <rect x="240" y="255" width="60" height="60" rx="6" fill="#0A1628" stroke="#F5EFE6" stroke-width="1"/>
  <text x="270" y="335" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="10" opacity="0.5">#0A1628</text>

  <rect x="310" y="255" width="60" height="60" rx="6" fill="#10B981"/>
  <text x="340" y="335" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="10" opacity="0.5">#10B981</text>

  <rect x="170" y="350" width="60" height="60" rx="6" fill="#F5EFE6"/>
  <text x="200" y="430" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="10" opacity="0.5">#F5EFE6</text>

  <rect x="240" y="350" width="60" height="60" rx="6" fill="#1a2947" stroke="#F5EFE6" stroke-width="1"/>
  <text x="270" y="430" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="10" opacity="0.5">#1a2947</text>

  <rect x="310" y="350" width="60" height="60" rx="6" fill="#3b82f6"/>
  <text x="340" y="430" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="10" opacity="0.5">#3b82f6</text>

  <!-- Logo placeholder circle center -->
  <circle cx="600" cy="310" r="100" fill="#1e3a5f" stroke="#FF6B2C" stroke-width="3"/>
  <circle cx="600" cy="310" r="80" fill="none" stroke="#FF6B2C" stroke-width="1" opacity="0.3"/>
  <text x="600" y="300" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="20" font-weight="bold">YOUR</text>
  <text x="600" y="330" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="22" font-weight="bold">LOGO</text>
  <!-- Crosshair guides -->
  <line x1="600" y1="200" x2="600" y2="420" stroke="#FF6B2C" stroke-width="0.5" opacity="0.3"/>
  <line x1="490" y1="310" x2="710" y2="310" stroke="#FF6B2C" stroke-width="0.5" opacity="0.3"/>

  <!-- Typography sample on right -->
  <rect x="810" y="200" width="280" height="280" rx="12" fill="#1e3a5f" opacity="0.4"/>
  <text x="950" y="240" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Typography</text>

  <text x="950" y="300" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="56" font-weight="bold">Aa</text>
  <text x="950" y="340" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="20">Heading Font</text>

  <text x="950" y="385" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.6">ABCDEFGHIJ</text>
  <text x="950" y="410" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.4">abcdefghij</text>
  <text x="950" y="445" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.3">1234567890</text>

  <!-- Bottom tagline -->
  <rect x="300" y="500" width="600" height="60" rx="10" fill="#1e3a5f" opacity="0.3"/>
  <text x="600" y="535" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.6">Brand Consistency = Customer Trust</text>

  <text x="600" y="600" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.5">Figgle Media</text>
</svg>