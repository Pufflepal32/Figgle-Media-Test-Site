<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0C2340"/>

  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0D5C3B" stroke-width="1" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gradient Overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C2340;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D2622A;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)"/>

  <!-- Icon -->
  <circle cx="600" cy="250" r="80" fill="#D2622A" opacity="0.2"/>
  <path d="M 600 200 L 650 250 L 600 300 L 550 250 Z" fill="#D2622A"/>

  <!-- Text -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#F5E6D3" text-anchor="middle">
    Blog Post Image
  </text>
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="24" fill="#F5E6D3" text-anchor="middle" opacity="0.7">
    1200 x 630 pixels
  </text>
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="18" fill="#F5E6D3" text-anchor="middle" opacity="0.5">
    Replace with your optimized image
  </text>
</svg>
