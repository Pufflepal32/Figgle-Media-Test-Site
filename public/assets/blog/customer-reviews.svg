<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1a2947"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="38" font-weight="bold">Customer Reviews for SEO</text>
  <text x="600" y="115" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="20">Turn happy customers into search rankings</text>

  <!-- 5 Stars -->
  <polygon points="400,200 410,230 442,230 416,248 426,278 400,260 374,278 384,248 358,230 390,230" fill="#FF6B2C"/>
  <polygon points="480,200 490,230 522,230 496,248 506,278 480,260 454,278 464,248 438,230 470,230" fill="#FF6B2C"/>
  <polygon points="560,200 570,230 602,230 576,248 586,278 560,260 534,278 544,248 518,230 550,230" fill="#FF6B2C"/>
  <polygon points="640,200 650,230 682,230 656,248 666,278 640,260 614,278 624,248 598,230 630,230" fill="#FF6B2C"/>
  <polygon points="720,200 730,230 762,230 736,248 746,278 720,260 694,278 704,248 678,230 710,230" fill="#FF6B2C"/>

  <!-- Speech bubble -->
  <rect x="350" y="310" width="500" height="160" rx="16" fill="#1e3a5f" stroke="#F5EFE6" stroke-width="1.5"/>
  <polygon points="500,470 520,470 480,510" fill="#1e3a5f" stroke="#F5EFE6" stroke-width="1.5"/>
  <!-- Cover the stroke inside bubble for the triangle -->
  <rect x="485" y="462" width="50" height="12" fill="#1e3a5f"/>

  <!-- Quote marks -->
  <text x="390" y="370" fill="#FF6B2C" font-family="Georgia, serif" font-size="60" opacity="0.6">"</text>
  <text x="800" y="440" fill="#FF6B2C" font-family="Georgia, serif" font-size="60" opacity="0.6">"</text>
  <!-- Quote text lines -->
  <rect x="420" y="360" width="360" height="10" rx="3" fill="#F5EFE6" opacity="0.2"/>
  <rect x="420" y="382" width="300" height="10" rx="3" fill="#F5EFE6" opacity="0.15"/>
  <rect x="420" y="404" width="340" height="10" rx="3" fill="#F5EFE6" opacity="0.12"/>
  <rect x="420" y="426" width="200" height="10" rx="3" fill="#F5EFE6" opacity="0.1"/>

  <!-- Thumbs up on right -->
  <circle cx="950" cy="350" r="55" fill="#1e3a5f" stroke="#10B981" stroke-width="2"/>
  <!-- Thumb shape -->
  <rect x="935" y="355" width="30" height="35" rx="4" fill="#10B981" opacity="0.6"/>
  <rect x="930" y="325" width="18" height="38" rx="9" fill="#10B981" opacity="0.8" transform="rotate(-10,939,344)"/>

  <!-- Rating number -->
  <text x="180" y="370" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="56" font-weight="bold">4.9</text>
  <text x="180" y="400" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.5">avg rating</text>

  <text x="600" y="580" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.5">Figgle Media</text>
</svg>