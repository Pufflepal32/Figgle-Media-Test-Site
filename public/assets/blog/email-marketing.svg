<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1a2947"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="38" font-weight="bold">Email Marketing Guide</text>
  <text x="600" y="115" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="20">Build your list and boost revenue</text>

  <!-- Large envelope -->
  <rect x="350" y="180" width="360" height="240" rx="8" fill="#1e3a5f" stroke="#F5EFE6" stroke-width="2"/>
  <!-- Envelope flap -->
  <polygon points="350,180 530,330 710,180" fill="none" stroke="#F5EFE6" stroke-width="2"/>
  <!-- Inner flap lines -->
  <line x1="350" y1="420" x2="460" y2="320" stroke="#F5EFE6" stroke-width="1" opacity="0.3"/>
  <line x1="710" y1="420" x2="600" y2="320" stroke="#F5EFE6" stroke-width="1" opacity="0.3"/>

  <!-- @ symbol on envelope -->
  <circle cx="530" cy="330" r="40" fill="#FF6B2C" opacity="0.2"/>
  <text x="530" y="348" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="48" font-weight="bold">@</text>

  <!-- Subscriber growth chart on right -->
  <rect x="780" y="180" width="340" height="240" rx="8" fill="#1e3a5f" opacity="0.5"/>
  <text x="950" y="210" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="14" opacity="0.6">Subscriber Growth</text>
  <!-- Grid lines -->
  <line x1="810" y1="230" x2="810" y2="400" stroke="#F5EFE6" stroke-width="0.5" opacity="0.1"/>
  <line x1="810" y1="400" x2="1090" y2="400" stroke="#F5EFE6" stroke-width="0.5" opacity="0.1"/>
  <line x1="810" y1="350" x2="1090" y2="350" stroke="#F5EFE6" stroke-width="0.5" opacity="0.05"/>
  <line x1="810" y1="300" x2="1090" y2="300" stroke="#F5EFE6" stroke-width="0.5" opacity="0.05"/>
  <line x1="810" y1="250" x2="1090" y2="250" stroke="#F5EFE6" stroke-width="0.5" opacity="0.05"/>
  <!-- Growth line going up -->
  <polyline points="820,390 860,385 900,370 940,340 980,300 1020,255 1060,230" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data dots -->
  <circle cx="820" cy="390" r="4" fill="#10B981"/>
  <circle cx="860" cy="385" r="4" fill="#10B981"/>
  <circle cx="900" cy="370" r="4" fill="#10B981"/>
  <circle cx="940" cy="340" r="4" fill="#10B981"/>
  <circle cx="980" cy="300" r="4" fill="#10B981"/>
  <circle cx="1020" cy="255" r="4" fill="#10B981"/>
  <circle cx="1060" cy="230" r="4" fill="#10B981"/>
  <!-- Arrow up -->
  <polygon points="1060,218 1050,232 1070,232" fill="#10B981"/>

  <!-- Stats below -->
  <rect x="200" y="470" width="240" height="80" rx="10" fill="#1e3a5f" stroke="#FF6B2C" stroke-width="1"/>
  <text x="320" y="510" text-anchor="middle" fill="#FF6B2C" font-family="Arial, sans-serif" font-size="26" font-weight="bold">42%</text>
  <text x="320" y="535" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="13" opacity="0.5">avg open rate</text>

  <rect x="500" y="470" width="240" height="80" rx="10" fill="#1e3a5f" stroke="#10B981" stroke-width="1"/>
  <text x="620" y="510" text-anchor="middle" fill="#10B981" font-family="Arial, sans-serif" font-size="26" font-weight="bold">$36</text>
  <text x="620" y="535" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="13" opacity="0.5">ROI per $1 spent</text>

  <rect x="800" y="470" width="240" height="80" rx="10" fill="#1e3a5f" stroke="#F5EFE6" stroke-width="1" opacity="0.5"/>
  <text x="920" y="510" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="26" font-weight="bold">4.2B</text>
  <text x="920" y="535" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="13" opacity="0.5">daily email users</text>

  <text x="600" y="600" text-anchor="middle" fill="#F5EFE6" font-family="Arial, sans-serif" font-size="16" opacity="0.5">Figgle Media</text>
</svg>