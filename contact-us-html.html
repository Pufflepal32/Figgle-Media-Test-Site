<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Roofing Company</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom Colors */
    .bg-cream { background-color: #FFF8E7; }
    .bg-dark-green { background-color: #1B3A2B; }
    .bg-burnt-orange { background-color: #D66F2C; }
    .bg-teal { background-color: #1FA4A9; }
    .text-dark-green { color: #1B3A2B; }
    .text-burnt-orange { color: #D66F2C; }
    .text-teal { color: #1FA4A9; }
    .text-gray-dark { color: #4A5D55; }
    .border-dark-green { border-color: #1B3A2B; }

    /* Hover Effects */
    .hover-lift:hover {
      transform: translateY(-2px);
    }
    .hover-scale:hover {
      transform: scale(1.1);
    }
    .icon-circle {
      transition: transform 0.3s ease;
    }
    .contact-card {
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    .contact-card:hover {
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    .cta-button {
      transition: all 0.3s ease;
    }
    .cta-button:hover {
      background-color: #B85820;
      transform: scale(1.05);
    }
    .phone-link:hover { color: #B85820; }
    .email-link:hover { color: #178388; }
  </style>
</head>
<body>

<!-- Contact Us Section -->
<section id="contact" class="py-16 md:py-24 bg-cream">
  <div class="container mx-auto px-4 sm:px-6 lg:px-8">
    <div class="max-w-6xl mx-auto">

      <!-- Section Header -->
      <div class="text-center mb-12">
        <h2 class="text-4xl md:text-5xl font-bold mb-4 text-dark-green">
          Contact Us
        </h2>
        <p class="text-lg md:text-xl text-gray-dark">
          Get in touch for a free roofing estimate
        </p>
      </div>

      <!-- 2-Column Layout -->
      <div class="grid md:grid-cols-2 gap-8 lg:gap-12">

        <!-- Left Column - Contact Information -->
        <div class="space-y-6">

          <!-- Contact Info Card -->
          <div class="contact-card bg-white rounded-2xl shadow-lg p-8">
            <h3 class="text-2xl font-bold mb-6 text-dark-green">
              Get In Touch
            </h3>

            <!-- Phone -->
            <div class="flex items-start mb-6 group">
              <div class="icon-circle bg-burnt-orange rounded-full p-3 mr-4 hover-scale">
                <!-- Phone Icon SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
              </div>
              <div>
                <h4 class="font-semibold mb-1 text-dark-green">Phone</h4>
                <a href="tel:{{phone_number}}" class="text-lg font-bold text-burnt-orange phone-link" style="transition: color 0.3s;">
                  {{phone_number}}
                </a>
              </div>
            </div>

            <!-- Email -->
            <div class="flex items-start mb-6 group">
              <div class="icon-circle bg-teal rounded-full p-3 mr-4 hover-scale">
                <!-- Email Icon SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                </svg>
              </div>
              <div>
                <h4 class="font-semibold mb-1 text-dark-green">Email</h4>
                <a href="mailto:{{email_address}}" class="text-lg font-bold text-teal email-link break-all" style="transition: color 0.3s;">
                  {{email_address}}
                </a>
              </div>
            </div>

            <!-- Service Area -->
            <div class="flex items-start mb-6 group">
              <div class="icon-circle bg-dark-green rounded-full p-3 mr-4 hover-scale">
                <!-- Map Pin Icon SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
              </div>
              <div>
                <h4 class="font-semibold mb-1 text-dark-green">Service Area</h4>
                <p class="text-lg text-gray-dark">{{service_area}}</p>
              </div>
            </div>

            <!-- Business Hours -->
            <div class="flex items-start group">
              <div class="icon-circle bg-burnt-orange rounded-full p-3 mr-4 hover-scale">
                <!-- Clock Icon SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
              </div>
              <div>
                <h4 class="font-semibold mb-1 text-dark-green">Business Hours</h4>
                <p class="text-lg text-gray-dark">
                  Mon-Fri: 8am - 6pm<br>
                  Sat: 9am - 4pm
                </p>
              </div>
            </div>
          </div>

          <!-- CTA Button -->
          <a href="tel:{{phone_number}}" class="cta-button block text-center font-bold text-lg py-4 px-8 rounded-xl shadow-lg bg-burnt-orange text-white">
            Call Now for Free Estimate
          </a>
        </div>

        <!-- Right Column - Map -->
        <div>
          <div class="contact-card rounded-2xl shadow-lg overflow-hidden border-4 border-dark-green">
            <div class="relative w-full h-full" style="min-height: 400px;">
              <iframe
                src="https://www.google.com/maps?q={{service_area}}&output=embed"
                class="absolute top-0 left-0 w-full h-full"
                style="border: 0; min-height: 400px;"
                allowfullscreen
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                title="Service Area Map"
              ></iframe>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

</body>
</html>
